# ============================================================
# sparkinai-admin-web Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sparkinai-admin-web
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sparkinai-admin-web
  template:
    metadata:
      labels:
        app: sparkinai-admin-web
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: sparkinai-admin-web
          image: ghcr.io/ve-weiyi/sparkinai-admin-web:latest
          ports:
            - containerPort: 80
              hostPort: 19521
          env:
            - name: TZ
              value: Asia/Shanghai
---
apiVersion: v1
kind: Service
metadata:
  name: sparkinai-admin-web
spec:
  selector:
    app: sparkinai-admin-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30521
  type: NodePort
